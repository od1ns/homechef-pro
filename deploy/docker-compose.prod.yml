# =====================================================================
# HomeChef Pro - Overrides de producción
# =====================================================================
# Uso:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# =====================================================================

services:
  postgres:
    restart: always
    ports: []     # no exponer al host en prod
    command: ["postgres", "-c", "log_min_duration_statement=500", "-c", "shared_buffers=256MB"]

  redis:
    restart: always
    ports: []
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD:?define REDIS_PASSWORD}", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]

  api:
    restart: always
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__Redis: "redis:6379,password=${REDIS_PASSWORD}"
    ports: []     # expuesto sólo detrás de nginx

  nginx:
    image: nginx:1.27-alpine
    container_name: homechef-nginx
    restart: always
    depends_on:
      - api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - nginx_logs:/var/log/nginx
    networks:
      - homechef-net

volumes:
  nginx_logs:
    driver: local
