# =====================================================================
# HomeChef Pro - Overrides de producción
# =====================================================================
# Uso:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# =====================================================================

services:
  postgres:
    restart: always
    ports: []     # no exponer al host en prod
    command: ["postgres", "-c", "log_min_duration_statement=500", "-c", "shared_buffers=256MB"]

  redis:
    restart: always
    ports: []
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD:?define REDIS_PASSWORD}", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]

  api:
    restart: always
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__Redis: "redis:6379,password=${REDIS_PASSWORD}"
    ports: []     # expuesto sólo detrás de nginx

  nginx:
    image: nginx:1.27-alpine
    container_name: homechef-nginx
    restart: always
    depends_on:
      - api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      # Let's Encrypt monta los certs en este path; certbot escribe el ACME
      # challenge en /var/www/certbot.
      - ./nginx/certs:/etc/nginx/certs:ro
      - certbot_www:/var/www/certbot:ro
      - nginx_logs:/var/log/nginx
    # Reload nginx cada 12h para tomar certs renovados (certbot corre 2 veces al día).
    command: >
      /bin/sh -c "while :; do sleep 12h & wait $${!};
      nginx -s reload; done & nginx -g 'daemon off;'"
    networks:
      - homechef-net

  # Certbot: corre el ACME challenge contra Let's Encrypt para emitir y renovar
  # certs. Se ejecuta en loop chequeando cada 12h. La emisión INICIAL se hace
  # con scripts/init-letsencrypt.sh — este servicio es solo para renovación.
  certbot:
    image: certbot/certbot:latest
    container_name: homechef-certbot
    restart: always
    volumes:
      - ./nginx/certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --quiet --deploy-hook \"echo cert-renewed at $$(date)\" ; sleep 12h & wait $${!}; done'"
    networks:
      - homechef-net

volumes:
  nginx_logs:
    driver: local
  certbot_www:
    driver: local
