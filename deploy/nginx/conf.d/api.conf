# =====================================================================
# HomeChef Pro - Reverse proxy con HTTPS (Let's Encrypt via certbot)
# =====================================================================
# Para activar HTTPS:
#   1. Obtener certificados con scripts/init-letsencrypt.sh (corre certbot
#      contra Let's Encrypt y deja los certs en deploy/nginx/certs/live/<dom>).
#   2. Setear DOMAIN en deploy/.env y reload de nginx:
#        docker compose -f docker-compose.yml -f docker-compose.prod.yml \
#            exec nginx nginx -s reload
# =====================================================================

upstream homechef_api {
    server api:8080;
    keepalive 32;
}

# ---------------------------------------------------------------------
# HTTP (puerto 80)
#   - Sirve el ACME challenge de Let's Encrypt en /.well-known/acme-challenge/
#   - Resto: redirige a HTTPS (cuando hay certs).
#   - Si todavía no hay certs, sirve la API por HTTP (fallback dev).
# ---------------------------------------------------------------------
server {
    listen       80;
    listen       [::]:80;
    server_name  _;

    # ACME challenge (certbot escribe en este dir)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        access_log off;
    }

    # Health sin auth ni redirect (util para checks externos)
    location /health {
        proxy_pass http://homechef_api;
        access_log off;
    }

    # Si HTTPS está habilitado, redirigir todo lo demás.
    # Comentar este bloque mientras no tengas certs (modo dev).
    # location / {
    #     return 301 https://$host$request_uri;
    # }

    # Mientras no haya certs, exponemos la API por HTTP.
    location /api/ {
        limit_req zone=api_rl burst=20 nodelay;

        proxy_pass         http://homechef_api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_read_timeout 60s;
    }
}

