# =====================================================================
# HomeChef Pro - Reverse proxy para la API
# =====================================================================
# Para HTTPS real, descomentar el server block 443 y montar certs en
# /etc/nginx/certs/ (letsencrypt/certbot, etc.)
# =====================================================================

upstream homechef_api {
    server api:8080;
    keepalive 32;
}

server {
    listen       80;
    listen       [::]:80;
    server_name  _;

    # En producción: redirigir a HTTPS
    # return 301 https://$host$request_uri;

    location /health {
        proxy_pass http://homechef_api;
        access_log off;
    }

    location /api/ {
        limit_req zone=api_rl burst=20 nodelay;

        proxy_pass         http://homechef_api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_read_timeout 60s;
    }

    # Asset servido por Flutter web (admin panel) — si se aloja aquí
    # location / {
    #     root   /var/www/admin;
    #     index  index.html;
    #     try_files $uri $uri/ /index.html;
    # }
}

