user  nginx;
worker_processes  auto;

error_log   /var/log/nginx/error.log  warn;
pid         /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;

    # Compresión para JSON / assets
    gzip              on;
    gzip_vary         on;
    gzip_min_length   512;
    gzip_proxied      any;
    gzip_types        application/json application/javascript text/css text/plain text/xml application/xml;

    # Rate limiting básico: 10 req/s por IP, burst 20
    limit_req_zone  $binary_remote_addr  zone=api_rl:10m  rate=10r/s;

    # Tamaño máximo para subida de comprobantes (imágenes de pago)
    client_max_body_size  10m;

    include /etc/nginx/conf.d/*.conf;
}
