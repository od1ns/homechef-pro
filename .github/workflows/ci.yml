name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  DOTNET_VERSION: '10.0.x'
  DOTNET_NOLOGO: 'true'
  DOTNET_CLI_TELEMETRY_OPTOUT: 'true'
  SOLUTION: 'src/backend/HomeChefPro.slnx'

jobs:
  unit-tests:
    name: Build + unit/model tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/Directory.Packages.props') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore ${{ env.SOLUTION }}

      - name: Build (Release)
        run: dotnet build ${{ env.SOLUTION }} --configuration Release --no-restore

      - name: Run non-integration tests
        run: |
          dotnet test ${{ env.SOLUTION }} \
            --configuration Release \
            --no-build \
            --filter "Category!=Integration" \
            --logger "trx;LogFileName=unit-tests.trx" \
            --collect:"XPlat Code Coverage"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: '**/TestResults/**/*.trx'

  # Integration tests (Testcontainers + Postgres).
  #
  # Estado actual: 9 de 30 pasan, 21 fallan con DbUpdateConcurrencyException
  # en AddPresentation y cascadas de 500 en Register/Login. La causa raiz
  # parece estar en triggers Postgres que retornan filas afectadas distintas
  # a las que EF Core 10 espera, pero el debugging requiere reproducir
  # localmente con Docker Desktop activo.
  #
  # Continue-on-error: true mientras el equipo investiga, asi el pipeline
  # NO bloquea PRs. Hay que sacarlo cuando los 21 fallos esten arreglados.
  integration-tests:
    name: Integration tests (Testcontainers + Postgres)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: unit-tests
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/Directory.Packages.props') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore ${{ env.SOLUTION }}

      # Testcontainers picks up the host Docker socket from ubuntu-latest by default.
      - name: Run integration tests
        run: |
          dotnet test ${{ env.SOLUTION }} \
            --configuration Release \
            --filter "Category=Integration" \
            --logger "trx;LogFileName=integration-tests.trx"

      - name: Upload integration results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: '**/TestResults/**/*.trx'
