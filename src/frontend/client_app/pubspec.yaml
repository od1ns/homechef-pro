name: homechef_client
description: HomeChef Pro customer mobile app (iOS + Android).
publish_to: none
version: 0.3.0+7

environment:
  sdk: '>=3.5.0 <4.0.0'
  flutter: '>=3.24.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  homechef_shared:
    path: ../shared
  cupertino_icons: ^1.0.8
  intl: ^0.20.0
  image_picker: ^1.1.2
  share_plus: ^10.1.4
  path_provider: ^2.1.5
  # Etapa 5: notificaciones push Firebase
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  integration_test:
    sdk: flutter
  http: ^1.2.0

flutter:
  uses-material-design: true
