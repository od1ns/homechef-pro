name: homechef_shared
description: Shared theme, i18n, models and API client for HomeChef Pro Flutter apps.
publish_to: none
version: 0.1.0

environment:
  sdk: '>=3.5.0 <4.0.0'
  flutter: '>=3.24.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_secure_storage: ^9.2.4
  http: ^1.2.2
  http_parser: ^4.0.2
  intl: ^0.19.0
  json_annotation: ^4.9.0
  shared_preferences: ^2.3.2

dev_dependencies:
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
